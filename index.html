<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Partner Portal — Premium OTT accounting and profit-sharing dashboard for two-partner business.">
    <title>Partner Portal | OTT Accounting</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <!-- Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Export -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Toast Stack ─────────────────────────────────────────────── -->
<div id="toast-stack"></div>

<div id="app">

    <!-- ── Login Overlay ──────────────────────────────────────── -->
    <div id="login-overlay" class="overlay">
        <div class="login-card">
            <div class="logo">
                <i data-lucide="bar-chart-3" class="logo-icon"></i>
                <h1>Triven Hub</h1>
            </div>
            <p class="login-tagline">Premium OTT Business Accounting Portal</p>
            
            <div id="login-error" class="login-error">
                <i data-lucide="alert-circle"></i>
                <span id="error-text">Invalid credentials</span>
            </div>

            <form class="login-form" id="login-form">
                <div class="input-wrapper">
                    <i data-lucide="user"></i>
                    <input type="text" id="login-id" class="login-input" placeholder="Username / ID">
                </div>
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" id="login-pass" class="login-input" placeholder="Password">
                    <button type="button" class="pass-toggle" onclick="auth.togglePass()">
                        <i data-lucide="eye" id="pass-icon"></i>
                    </button>
                </div>
                <button type="submit" id="login-submit-btn" class="login-btn">
                    <span>Secure Sign In</span>
                    <i data-lucide="arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- ── Main App ────────────────────────────────────────────── -->
    <div id="main-content" class="hidden">

        <!-- ── Sidebar ──────────────────────────────────────── -->
        <nav class="sidebar">
            <div class="nav-branding">
                <div class="nav-logo-box">
                    <i data-lucide="bar-chart-3"></i>
                </div>
                <div class="nav-brand-text">
                    <strong>OTT Portal</strong>
                    <em>Partner Accounting</em>
                </div>
            </div>

            <div class="nav-links">
                <button class="nav-item active" data-page="dashboard">
                    <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
                </button>

                <div class="nav-section-label">Transactions</div>
                <button class="nav-item" data-page="sales">
                    <i data-lucide="trending-up" class="v-green"></i><span>Sales</span>
                </button>
                <button class="nav-item" data-page="purchases">
                    <i data-lucide="shopping-bag" class="v-amber"></i><span>Purchases</span>
                </button>
                <button class="nav-item" data-page="expenses">
                    <i data-lucide="receipt" class="v-red"></i><span>Expenses</span>
                </button>
                <button class="nav-item" data-page="ledger">
                    <i data-lucide="list-ordered"></i><span>General Ledger</span>
                </button>

                <div class="nav-section-label">Masters</div>
                <button class="nav-item" data-page="accounts">
                    <i data-lucide="wallet-2"></i><span>Accounts</span>
                </button>
                <button class="nav-item" data-page="groups">
                    <i data-lucide="folder-tree"></i><span>Ledger Groups</span>
                </button>
                <button class="nav-item" data-page="ledgers">
                    <i data-lucide="book-key"></i><span>Ledgers</span>
                </button>

                <div class="nav-section-label">Analysis</div>
                <button class="nav-item" data-page="reports">
                    <i data-lucide="file-bar-chart-2"></i><span>Reports</span>
                </button>
                <button class="nav-item" data-page="partners">
                    <i data-lucide="handshake"></i><span>Partners</span>
                </button>

                <div class="nav-section-label">System</div>
                <button class="nav-item" data-page="settings">
                    <i data-lucide="settings-2"></i><span>Settings</span>
                </button>
            </div>

            <div class="nav-footer">
                <button class="logout-btn" onclick="auth.logout()">
                    <i data-lucide="log-out"></i><span>Sign Out</span>
                </button>
            </div>
        </nav>

        <!-- ── Content Area ──────────────────────────────────── -->
        <div class="content-area">

            <!-- Sticky Topbar -->
            <header class="top-header">
                <div class="header-left">
                    <h2 id="page-title">Dashboard</h2>
                    <span class="user-badge" id="current-user-tag">Partner</span>
                </div>
                <div class="header-right">
                    <div class="quick-actions">
                        <button class="quick-add-btn sales" onclick="ui.openModal('sale-add')">
                            <i data-lucide="plus"></i><span>Sales</span>
                        </button>
                        <button class="quick-add-btn purchase" onclick="ui.openModal('purchase-add')">
                            <i data-lucide="minus"></i><span>Purchase</span>
                        </button>
                        <button class="quick-add-btn expense" onclick="ui.openModal('expense-add')">
                            <i data-lucide="arrow-down"></i><span>Expense</span>
                        </button>
                    </div>
                    <button class="icon-btn logout-header-btn" onclick="auth.logout()" title="Secure Sign Out">
                        <i data-lucide="log-out"></i>
                    </button>
                </div>
            </header>

            <!-- Global Date Filter Bar -->
            <div id="filter-bar-root"></div>

            <!-- Page Content -->
            <main id="page-container"></main>

        </div><!-- /content-area -->

        <!-- ── Mobile Bottom Nav ─────────────────────────────── -->
        <nav class="mobile-nav">
            <button data-page="dashboard"><i data-lucide="layout-dashboard"></i>Home</button>
            <button data-page="sales"><i data-lucide="trending-up"></i>Sales</button>
            <button data-page="purchases"><i data-lucide="shopping-bag"></i>Purch</button>
            <button data-page="accounts"><i data-lucide="wallet-2"></i>Acc</button>
            <button data-page="reports"><i data-lucide="file-text"></i>Rpt</button>
        </nav>

    </div><!-- /main-content -->

</div><!-- /app -->

<!-- ── Modal Overlay ──────────────────────────────────────────── -->
<div id="modal-overlay" class="overlay hidden" onclick="if(event.target===this)ui.closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3 id="modal-title">Modal</h3>
            <button class="close-modal" onclick="ui.closeModal()">✕</button>
        </div>
        <div id="modal-body"></div>
    </div>
</div>

<script src="db.js"></script>
<script src="app.js"></script>

<script>
    // Boot UI
    lucide.createIcons();
</script>
</body>
</html>
